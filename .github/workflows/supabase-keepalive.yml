name: Supabase Keepalive

on:
  schedule:
    - cron: "23 9 * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ping Supabase
        run: node scripts/supabase-keepalive.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_KEEPALIVE_EMAIL: ${{ secrets.SUPABASE_KEEPALIVE_EMAIL }}
          SUPABASE_KEEPALIVE_PASSWORD: ${{ secrets.SUPABASE_KEEPALIVE_PASSWORD }}
